<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - Preventura Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #ffffff 0%, #f4f6f8 100%);
            color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 1px solid #eef0f2;
        }
        h1 { margin-bottom: 10px; font-size: 2.2rem; color: #1a252f; font-weight: 700; }
        p { margin-bottom: 30px; color: #5c6c7c; line-height: 1.6; font-size: 1.05rem; }
        .btn {
            display: block;
            width: 100%;
            padding: 15px 0;
            margin: 12px 0;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
            background-color: #0077b6;
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(0, 119, 182, 0.2);
        }
        .btn:hover { background-color: #005f92; }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔐 Reset Password</h1>
        <p>Click the button below to set a new password in the app.</p>
        <a id="launch-btn" href="#" class="btn">Open App</a>
    </div>

    <script>
        // Specific path for the app to recognize this event
        const customSchemeBase = "preventura-admin://auth/admin/recovery"; 
        
        const params = window.location.search + window.location.hash;
        document.getElementById('launch-btn').href = customSchemeBase + params;

        setTimeout(() => { window.location.href = customSchemeBase + params; }, 1000);
    </script>
</body>
</html>
