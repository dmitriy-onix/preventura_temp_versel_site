<!DOCTYPE html>
<html>
<head>
    <title>Log In</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 40px; }
        .btn { background-color: #333; color: white; padding: 15px 30px; text-decoration: none; border-radius: 5px; font-weight: bold; display: inline-block; margin-top: 20px;}
    </style>
</head>
<body>
    <h1>Welcome Back!</h1>
    <p>Click the button below to sign in.</p>
    <a id="launch-btn" href="#" class="btn">Log In to App</a>

    <script>
        const customSchemeBase = "preventura-admin://auth/admin/login"; 
        
        const params = window.location.search + window.location.hash;
        document.getElementById('launch-btn').href = customSchemeBase + params;

        setTimeout(() => { window.location.href = customSchemeBase + params; }, 1000);
    </script>
</body>
</html>
