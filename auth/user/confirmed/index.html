<!DOCTYPE html>
<html>
<head>
    <title>Email Verified</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 40px; }
        .btn { background-color: #3ecf8e; color: white; padding: 15px 30px; text-decoration: none; border-radius: 5px; font-weight: bold; display: inline-block; margin-top: 20px;}
    </style>
</head>
<body>
    <h1>🎉 Success!</h1>
    <p>Your email has been verified.</p>
    <a id="launch-btn" href="#" class="btn">Continue to App</a>

    <script>
        const customSchemeBase = "preventura-user://auth/user/confirmed"; 
        
        const params = window.location.search + window.location.hash;
        document.getElementById('launch-btn').href = customSchemeBase + params;

        // Auto-redirect attempt
        setTimeout(() => { window.location.href = customSchemeBase + params; }, 1000);
    </script>
</body>
</html>
